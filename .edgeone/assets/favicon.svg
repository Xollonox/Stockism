<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E11D48"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>
    <linearGradient id="gradH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E11D48" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="64" height="64" rx="12" fill="#050505"/>
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Candlestick chart icon -->
  <!-- Left candle (down/red) -->
  <rect x="14" y="28" width="6" height="18" rx="1" fill="#EF4444" opacity="0.7"/>
  <rect x="16" y="24" width="2" height="6" fill="#EF4444" opacity="0.5"/>
  
  <!-- Middle candle (up/green) -->
  <rect x="23" y="18" width="6" height="28" rx="1" fill="url(#grad)"/>
  <rect x="25" y="14" width="2" height="6" fill="url(#grad)"/>
  <rect x="25" y="44" width="2" height="4" fill="url(#grad)" opacity="0.7"/>
  
  <!-- Right candle (up/green - smaller) -->
  <rect x="32" y="24" width="6" height="22" rx="1" fill="url(#grad)" opacity="0.8"/>
  <rect x="34" y="20" width="2" height="6" fill="url(#grad)" opacity="0.6"/>
  
  <!-- Moving average line -->
  <polyline points="8,42 18,36 28,26 38,30 48,22" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  
  <!-- Arrow up indicator -->
  <polygon points="48,18 44,26 52,26" fill="#10B981" opacity="0.8"/>
  
  <!-- Φ Phi symbol overlay -->
  <text x="52" y="58" fill="#E11D48" font-family="'Times New Roman', serif" font-size="14" font-weight="bold" opacity="0.4" text-anchor="end">Φ</text>
</svg>
