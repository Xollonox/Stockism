<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <title>Stockism – Elite Lookism Trading Terminal</title>
    <meta name="description" content="The ultimate Lookism fan trading market. Premium character trading and real-time rankings." />
    <meta name="theme-color" content="#050505" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="https://iconsear.ch/images/32/stock.png" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg0: 'var(--color-bg0)',
              bg1: 'var(--color-bg1)',
              card: 'var(--color-card)',
              line: 'var(--color-line)',
              brand: 'var(--color-brand)',
              brand2: 'var(--color-brand2)',
              good: 'var(--color-good)',
              bad: 'var(--color-bad)',
              warn: 'var(--color-warn)',
              muted: 'var(--color-muted)',
            },
            fontFamily: {
              heading: ['Orbitron', 'sans-serif'],
              sans: ['Outfit', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'ui-monospace', 'monospace'],
              body: ['Outfit', 'system-ui', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'fade-in-up': 'fadeInUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'shake': 'shake 120ms cubic-bezier(0.4, 0, 0.2, 1) both',
              'scanline': 'scanline 2s linear infinite',
              'float': 'float 6s ease-in-out infinite',
              'pulse-ring': 'pulseRing 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite',
              'glow-pulse': 'glowPulse 3s ease-in-out infinite',
              'data-scroll': 'dataScroll 20s linear infinite',
              'slide-up': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'zoom-in': 'zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'border-pulse': 'borderPulse 2s ease-in-out infinite',
              'sparkle': 'sparkle 1.5s ease-in-out infinite',
              'ripple': 'ripple 0.6s linear',
              'particle-float': 'particleFloat 3s ease-in-out infinite',
              'price-flash': 'priceFlash 0.3s ease-out',
              'tilt-glow': 'tiltGlow 4s ease-in-out infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(12px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '20%': { transform: 'translateX(-2.5px)' },
                '40%': { transform: 'translateX(2.5px)' },
                '60%': { transform: 'translateX(-1.5px)' },
                '80%': { transform: 'translateX(1.5px)' },
              },
              scanline: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              },
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-8px)' },
              },
              pulseRing: {
                '0%': { transform: 'scale(1)', opacity: '1' },
                '100%': { transform: 'scale(2.5)', opacity: '0' },
              },
              glowPulse: {
                '0%, 100%': { boxShadow: '0 0 8px rgba(225,29,72,0.3)' },
                '50%': { boxShadow: '0 0 25px rgba(225,29,72,0.6)' },
              },
              dataScroll: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px) scale(0.98)' },
                '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
              },
              slideInRight: {
                '0%': { opacity: '0', transform: 'translateX(20px)' },
                '100%': { opacity: '1', transform: 'translateX(0)' },
              },
              zoomIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              borderPulse: {
                '0%, 100%': { borderColor: 'rgba(225,29,72,0.2)' },
                '50%': { borderColor: 'rgba(225,29,72,0.6)' },
              },
              sparkle: {
                '0%, 100%': { opacity: '0', transform: 'scale(0)' },
                '50%': { opacity: '1', transform: 'scale(1)' },
              },
              ripple: {
                '0%': { transform: 'scale(0)', opacity: '0.5' },
                '100%': { transform: 'scale(4)', opacity: '0' },
              },
              particleFloat: {
                '0%': { transform: 'translateY(0) translateX(0)', opacity: '0' },
                '20%': { opacity: '0.6' },
                '80%': { opacity: '0.6' },
                '100%': { transform: 'translateY(-60px) translateX(20px)', opacity: '0' },
              },
              priceFlash: {
                '0%': { transform: 'scale(1.15)', color: '#10B981' },
                '100%': { transform: 'scale(1)', color: 'inherit' },
              },
              tiltGlow: {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              },
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

      :root {
        --color-bg0: #050505;
        --color-bg1: rgba(20, 20, 23, 0.65);
        --color-card: rgba(28, 28, 33, 0.45);
        --color-line: rgba(255, 255, 255, 0.08);
        --color-brand: #E11D48;
        --color-brand2: #881337;
        --color-good: #10B981;
        --color-bad: #EF4444;
        --color-warn: #F59E0B;
        --color-muted: #9CA3AF;
        --color-text-main: #F3F4F6;
        --glass-blur: 12px;
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }

      [data-theme='neon'] {
        --color-bg0: #060212;
        --color-bg1: rgba(11, 4, 24, 0.75);
        --color-card: rgba(22, 10, 44, 0.45);
        --color-line: rgba(209, 0, 243, 0.2);
        --color-brand: #00F0FF;
        --color-brand2: #FF007F;
        --color-good: #39FF14;
        --color-bad: #FF073A;
        --color-warn: #FFE600;
        --color-muted: #A594F4;
        --color-text-main: #E5E0FA;
        --glass-blur: 16px;
        --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
      }

      body {
        background-color: var(--color-bg0);
        color: var(--color-text-main);
        font-family: 'Outfit', sans-serif;
        transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      [data-theme='neon'] body {
        background-image: 
          radial-gradient(circle at 50% 30%, rgba(209, 0, 243, 0.08), transparent 50%),
          radial-gradient(circle at 10% 80%, rgba(0, 240, 255, 0.06), transparent 45%),
          linear-gradient(rgba(209, 0, 243, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(209, 0, 243, 0.04) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 35px 35px, 35px 35px;
        background-attachment: fixed;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.035;
        pointer-events: none;
        z-index: 10000;
      }

      /* CRT Scanline effect */
      .crt-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.12) 50%);
        background-size: 100% 4px;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.15;
      }
      [data-theme='neon'] .crt-overlay {
        opacity: 0.25;
      }

      .font-heading {
        font-family: 'Orbitron', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .glass-panel {
        background-color: var(--color-bg1);
        backdrop-filter: blur(var(--glass-blur));
        -webkit-backdrop-filter: blur(var(--glass-blur));
        border: 1px solid var(--color-line);
        box-shadow: var(--glass-shadow);
        transition: border 0.3s ease, box-shadow 0.3s ease;
      }

      /* Laser Sweep Animation */
      @keyframes laser-sweep {
        0% { transform: translateY(-100%) rotate(-12deg); }
        100% { transform: translateY(220%) rotate(-12deg); }
      }
      .laser-sweep {
        position: absolute;
        top: -50%; left: -25%; width: 150%; height: 40px;
        background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.08) 50%, transparent);
        transform: rotate(-12deg);
        pointer-events: none;
        z-index: 10;
        opacity: 0;
      }
      [data-theme='neon'] .laser-sweep {
        background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.15) 50%, transparent);
      }
      .group:hover .laser-sweep {
        animation: laser-sweep 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        opacity: 1;
      }

      /* Glitch Effect on Title Hover */
      @keyframes glitch-skew {
        0% { transform: skew(0deg); }
        20% { transform: skew(-3deg); }
        40% { transform: skew(3deg); }
        60% { transform: skew(-1deg); }
        80% { transform: skew(1deg); }
        100% { transform: skew(0deg); }
      }
      .cyber-glitch-hover:hover {
        animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
      }

      /* Glow pulse effect */
      @keyframes neon-glow {
        0%, 100% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.1), 0 0 2px rgba(0, 240, 255, 0.05); }
        50% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.25), 0 0 5px rgba(0, 240, 255, 0.1); }
      }
      .neon-glow-pulse {
        animation: neon-glow 3s infinite ease-in-out;
      }      /* Selection styling */
      @keyframes float-dust {
        0% { transform: translateY(0px) translateX(0px); opacity: 0; }
        10% { opacity: 0.4; }
        90% { opacity: 0.4; }
        100% { transform: translateY(-100px) translateX(25px); opacity: 0; }
      }
      .dust-particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: var(--color-brand);
        border-radius: 50%;
        pointer-events: none;
        animation: float-dust 8s infinite linear;
      }

      ::-moz-selection { background: var(--color-brand); color: #fff; }
      ::selection { background: var(--color-brand); color: #fff; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--color-bg0); }
      ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-brand); }
      [data-theme='neon'] ::-webkit-scrollbar-thumb:hover { background: var(--color-brand2); }

      .clip-corner {
        clip-path: polygon(
          0 0, 
          100% 0, 
          100% calc(100% - 8px), 
          calc(100% - 8px) 100%, 
          0 100%
        );
      }

      .stockism-character-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(40%) saturate(80%) brightness(0.85);
        transform: scale(1);
        transition: filter 400ms cubic-bezier(0.25, 1, 0.5, 1), transform 400ms cubic-bezier(0.25, 1, 0.5, 1);
        will-change: transform, filter;
      }

      .character-card:hover .stockism-character-image,
      .character-card:focus-within .stockism-character-image {
        filter: grayscale(0%) saturate(115%) brightness(0.95);
        transform: scale(1.03);
      }

      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-delay: -1ms !important;
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          background-attachment: initial !important;
          scroll-behavior: auto !important;
          transition-duration: 0s !important;
          transition-delay: 0s !important;
        }
        .stockism-character-image {
          transition: none !important;
          filter: none !important;
          transform: none !important;
        }
        .animate-shake, .laser-sweep, .cyber-glitch-hover:hover {
          animation: none !important;
        }
      }

      /* ═══════════════════════════════════════════════
         PREMIUM EFFECTS — 3D TILT, PARTICLES, GLASS 2.0
         ═══════════════════════════════════════════════ */

      /* === 3D Card Tilt Container === */
      .card-3d {
        perspective: 1200px;
        transform-style: preserve-3d;
      }
      .card-3d-inner {
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        transform-style: preserve-3d;
        will-change: transform;
      }
      .card-3d:hover .card-3d-inner {
        transform: rotateX(var(--rotateX, 0deg)) rotateY(var(--rotateY, 0deg));
      }

      /* === Glossy Reflection Overlay === */
      .glass-gloss::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255,255,255,0.08) 0%,
          transparent 40%,
          transparent 60%,
          rgba(255,255,255,0.03) 100%
        );
        pointer-events: none;
        z-index: 5;
      }

      /* === Animated Border Gradient === */
      .border-gradient {
        position: relative;
      }
      .border-gradient::before {
        content: '';
        position: absolute;
        inset: -1px;
        background: linear-gradient(
          135deg,
          var(--color-brand), 
          var(--color-brand2), 
          var(--color-brand)
        );
        background-size: 200% 200%;
        border-radius: inherit;
        z-index: -1;
        animation: tiltGlow 4s ease-in-out infinite;
        opacity: 0.4;
        transition: opacity 0.3s ease;
      }
      .border-gradient:hover::before {
        opacity: 0.8;
      }

      /* === Price Change Animation === */
      .price-up {
        animation: priceFlash 0.4s ease-out;
        color: #10B981 !important;
      }
      .price-down {
        animation: priceFlash 0.4s ease-out;
        color: #EF4444 !important;
      }

      /* === Particle Sparkle Container === */
      .particle-container {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 20;
      }
      .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: var(--color-brand);
        border-radius: 50%;
        opacity: 0;
        animation: sparkle var(--duration, 1.5s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }

      /* === Glowing Text Effect === */
      .text-glow {
        text-shadow: 0 0 10px var(--color-brand), 0 0 20px var(--color-brand), 0 0 40px var(--color-brand);
      }
      .text-glow-good {
        text-shadow: 0 0 10px var(--color-good), 0 0 20px var(--color-good);
      }

      /* === Smooth Page Transitions === */
      .view-enter {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
      }
      .view-enter-active {
        opacity: 1;
        transform: translateY(0) scale(1);
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* === Premium Data Ticker === */
      .ticker-wrap {
        overflow: hidden;
        white-space: nowrap;
        position: relative;
      }
      .ticker-content {
        display: inline-flex;
        animation: dataScroll 30s linear infinite;
      }
      .ticker-content:hover {
        animation-play-state: paused;
      }

      /* === Rarity-specific Border Glow Animations === */
      .rarity-mythic { box-shadow: 0 0 15px rgba(239,68,68,0.2), inset 0 0 15px rgba(239,68,68,0.05); }
      .rarity-legendary { box-shadow: 0 0 12px rgba(245,158,11,0.15), inset 0 0 12px rgba(245,158,11,0.03); }
      .rarity-epic { box-shadow: 0 0 10px rgba(192,38,211,0.12); }
      .rarity-rare { box-shadow: 0 0 8px rgba(59,130,246,0.08); }

      /* === Staggered Animation Delays === */
      .stagger-1 { animation-delay: 0.05s !important; }
      .stagger-2 { animation-delay: 0.1s !important; }
      .stagger-3 { animation-delay: 0.15s !important; }
      .stagger-4 { animation-delay: 0.2s !important; }
      .stagger-5 { animation-delay: 0.25s !important; }
      .stagger-6 { animation-delay: 0.3s !important; }
      .stagger-7 { animation-delay: 0.35s !important; }
      .stagger-8 { animation-delay: 0.4s !important; }

      /* === Grid Background for Premium Sections === */
      .bg-grid-premium {
        background-image: 
          radial-gradient(circle at 1px 1px, var(--color-line) 1px, transparent 0);
        background-size: 24px 24px;
      }

      /* === Stat Counter Glow === */
      .stat-glow {
        position: relative;
      }
      .stat-glow::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 80px;
        height: 80px;
        background: radial-gradient(circle, rgba(225,29,72,0.08), transparent 70%);
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      /* ═══════════════════════════════════════════════
         GLASS 3D ULTRA — PREMIUM EFFECTS
         ═══════════════════════════════════════════════ */

      .glass-3d {
        position: relative;
        background: linear-gradient(135deg, rgba(20,20,23,0.6), rgba(28,28,33,0.25));
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05), 0 0 0 1px rgba(255,255,255,0.03);
        transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .glass-3d:hover {
        border-color: rgba(225,29,72,0.2);
        box-shadow: 0 30px 60px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(225,29,72,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
      }

      .float-3d {
        animation: float3d 8s ease-in-out infinite;
        transform-style: preserve-3d;
      }
      @keyframes float3d {
        0%, 100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
        25% { transform: translateY(-10px) rotateX(2deg) rotateY(-2deg); }
        50% { transform: translateY(-5px) rotateX(-1deg) rotateY(3deg); }
        75% { transform: translateY(-15px) rotateX(1deg) rotateY(-1deg); }
      }

      .border-glow {
        position: relative;
      }
      .border-glow::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(225,29,72,0.3), rgba(136,19,55,0.1), rgba(225,29,72,0.3));
        background-size: 200% 200%;
        animation: shimmer 3s ease-in-out infinite;
        z-index: -1;
        opacity: 0;
        transition: opacity 0.4s ease;
      }
      .border-glow:hover::before { opacity: 1; }

      .glass-refract {
        position: relative;
        overflow: hidden;
      }
      .glass-refract::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.03) 0%, transparent 60%);
        pointer-events: none;
      }
      .glass-refract::after {
        content: '';
        position: absolute;
        bottom: -50%; right: -50%;
        width: 200%; height: 200%;
        background: radial-gradient(circle at 70% 60%, rgba(225,29,72,0.03) 0%, transparent 60%);
        pointer-events: none;
      }

      .premium-card {
        position: relative;
        background: linear-gradient(135deg, rgba(28,28,33,0.4) 0%, rgba(20,20,23,0.6) 100%);
        backdrop-filter: blur(16px) saturate(1.2);
        -webkit-backdrop-filter: blur(16px) saturate(1.2);
        border: 1px solid rgba(255,255,255,0.06);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .premium-card:hover {
        border-color: rgba(225,29,72,0.15);
        box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(225,29,72,0.06), inset 0 1px 0 rgba(255,255,255,0.06);
        transform: translateY(-2px);
      }

      .glass-divider {
        height: 1px;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 20%, rgba(225,29,72,0.15) 50%, rgba(255,255,255,0.06) 80%, transparent 100%);
        background-size: 200% 100%;
        animation: shimmer 3s ease-in-out infinite;
      }

      .hover-3d { perspective: 800px; }
      .hover-3d-child {
        transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        transform-style: preserve-3d;
      }
      .hover-3d:hover .hover-3d-child {
        transform: rotateX(3deg) rotateY(-3deg) translateZ(10px);
      }

      .text-shimmer {
        background: linear-gradient(90deg, #fff 0%, #E11D48 25%, #fff 50%, #E11D48 75%, #fff 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmer 3s ease-in-out infinite;
      }

      .pulse-shadow {
        animation: pulseShadow 2s ease-in-out infinite;
      }
      @keyframes pulseShadow {
        0%, 100% { box-shadow: 0 0 8px rgba(225,29,72,0.15); }
        50% { box-shadow: 0 0 20px rgba(225,29,72,0.3), 0 0 40px rgba(225,29,72,0.1); }
      }

      .corner-cut {
